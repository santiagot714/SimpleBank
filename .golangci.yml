---
version: "2"

linters:
  default: standard
  enable:
    # Bugs
    - errorlint
    - nilerr
    - nilnil
    - sqlclosecheck
    - rowserrcheck
    # Style
    - revive
    - gocritic
    - misspell
    # Tests
    - testifylint
    - thelper
    # Security
    - gosec
  settings:
    gosec:
      excludes:
        - G404 # Use of weak random number generator (math/rand) — acceptable in tests
  exclusions:
    rules:
      # Ignore generated files from sqlc
      - path: db/sqlc/.*\.sql\.go
        linters:
          - all
